name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Require package-lock.json
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is missing from this branch. Run 'npm install' locally, commit package-lock.json, and push."
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          # Prisma 5 + Next 14: use Node 20 for app tooling (Actions still run on Node 24 via env above)
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Prisma versions
        run: |
          set -euo pipefail
          node -p "require('@prisma/client/package.json').version"
          ./node_modules/.bin/prisma --version
          test "$(node -p "require('@prisma/client/package.json').version")" = "5.22.0"

      - name: Validate Prisma schema
        run: npm run db:validate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nexovita?schema=public

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nexovita?schema=public

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nexovita?schema=public

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

# Cloud Build — build image, run migrations, deploy to Cloud Run
#
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_CLOUDSQL_INSTANCE=PROJECT:REGION:INSTANCE,_APP_URL=https://app.yourdomain.com,_S3_ENDPOINT=https://ACCOUNT.r2.cloudflarestorage.com
#
# One-time: ./deploy/setup-gcp-runtime.sh (dedicated SAs + secret IAM)

substitutions:
  _SERVICE: nexovita
  _REGION: africa-south1
  _REPOSITORY: nexovita
  _RUNTIME_SA: nexovita-runtime
  _MIGRATE_SA: nexovita-migrate
  _SMTP_PORT: "587"
  _SMTP_SECURE: "false"
  # Set via GitHub Actions vars or: gcloud builds submit --substitutions=...
  _CLOUDSQL_INSTANCE: ""
  _APP_URL: https://example.com
  _S3_ENDPOINT: https://example.r2.cloudflarestorage.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamicSubstitutions: true

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --progress=plain
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_APP_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID

  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -z "${_CLOUDSQL_INSTANCE}" ]; then
          echo "ERROR: _CLOUDSQL_INSTANCE is required (PROJECT:REGION:INSTANCE)."
          echo "Pass --substitutions=_CLOUDSQL_INSTANCE=your-project:africa-south1:your-sql-instance"
          exit 1
        fi
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID"
        MIGRATE_SA="${_MIGRATE_SA}@$PROJECT_ID.iam.gserviceaccount.com"
        CMD=(gcloud run jobs deploy ${_SERVICE}-migrate
          --image="$$IMAGE"
          --region="${_REGION}"
          --service-account="$$MIGRATE_SA"
          --command=node
          --args=node_modules/prisma/build/index.js,migrate,deploy
          --set-env-vars=NODE_ENV=production
          --set-secrets=DATABASE_URL=nexovita-database-url:latest
          --max-retries=0
          --task-timeout=600s
          --memory=512Mi
          --cpu=1)
        if [ -n "${_CLOUDSQL_INSTANCE}" ]; then
          CMD+=(--set-cloudsql-instances="${_CLOUDSQL_INSTANCE}")
        fi
        "$${CMD[@]}"
        gcloud run jobs execute ${_SERVICE}-migrate --region="${_REGION}" --wait

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID"
        RUNTIME_SA="${_RUNTIME_SA}@$PROJECT_ID.iam.gserviceaccount.com"
        CMD=(gcloud run deploy ${_SERVICE}
          --image="$$IMAGE"
          --region="${_REGION}"
          --platform=managed
          --service-account="$$RUNTIME_SA"
          --execution-environment=gen2
          --port=8080
          --memory=1Gi
          --cpu=1
          --min-instances=0
          --max-instances=20
          --timeout=300
          --concurrency=80
          --cpu-boost
          --allow-unauthenticated
          --set-env-vars=NODE_ENV=production,STORAGE_PROVIDER=s3,AWS_REGION=auto,S3_FORCE_PATH_STYLE=true,SMTP_PORT=${_SMTP_PORT},SMTP_SECURE=${_SMTP_SECURE},NEXT_PUBLIC_APP_URL=${_APP_URL},S3_ENDPOINT=${_S3_ENDPOINT}
          --set-secrets=DATABASE_URL=nexovita-database-url:latest,JWT_SECRET=nexovita-jwt-secret:latest,CRON_SECRET=nexovita-cron-secret:latest,AWS_ACCESS_KEY_ID=nexovita-storage-key-id:latest,AWS_SECRET_ACCESS_KEY=nexovita-storage-secret:latest,S3_BUCKET=nexovita-storage-bucket:latest,SMTP_HOST=nexovita-smtp-host:latest,SMTP_USER=nexovita-smtp-user:latest,SMTP_PASS=nexovita-smtp-pass:latest,EMAIL_FROM=nexovita-email-from:latest,CLOUDFLARE_TOKEN=nexovita-cloudflare-token:latest)
        if [ -n "${_CLOUDSQL_INSTANCE}" ]; then
          CMD+=(--add-cloudsql-instances="${_CLOUDSQL_INSTANCE}")
        fi
        "$${CMD[@]}"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
